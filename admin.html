<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Sessions Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Login Page */
    #loginPage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #loginPage.hidden {
      display: none !important;
    }

    .login-box {
      background: #1a1a1a;
      border: 2px solid #00d4ff;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .login-box h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d4ff;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #333;
      border-radius: 6px;
      background: #0f0f0f;
      color: #fff;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00d4ff;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 6px;
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    .error {
      color: #ff4444;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    .success {
      color: #44ff44;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    /* Dashboard */
    #dashboardPage {
      display: none;
    }

    #dashboardPage.visible {
      display: block;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
    }

    .header h1 {
      color: #00d4ff;
      font-size: 28px;
    }

    .logout-btn {
      padding: 10px 20px;
      background: #ff4444;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #cc0000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #0f0f0f;
      border-bottom: 2px solid #00d4ff;
    }

    th {
      padding: 15px;
      text-align: left;
      color: #00d4ff;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #333;
      font-size: 13px;
      color: #ccc;
    }

    tbody tr:hover {
      background: #2a2a2a;
    }

    .copy-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-value {
      font-family: monospace;
      font-size: 11px;
      color: #88ff88;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-all;
      max-width: 150px;
    }

    .copy-btn {
      padding: 5px 10px;
      background: #00d4ff;
      border: none;
      border-radius: 4px;
      color: #000;
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #00ffff;
    }

    .copy-btn.copied {
      background: #44ff44;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #00d4ff;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- LOGIN PAGE -->
  <div id="loginPage">
    <div class="login-box">
      <h1>🔐 Admin Panel</h1>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn">Login</button>
        <div id="loginMsg" class="error" style="display:none;"></div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage">
    <div class="container">
      <div class="header">
        <h1>📊 Sessions Manager</h1>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>

      <div id="loading" class="loading" style="display:none;">Loading sessions...</div>
      <div id="empty" class="empty" style="display:none;">No sessions found</div>

      <table id="sessionTable" style="display:none;">
        <thead>
          <tr>
            <th>Username</th>
            <th>UID</th>
            <th>Session ID</th>
            <th>CSRF Token</th>
            <th>Added At</th>
            <th>Last Used</th>
          </tr>
        </thead>
        <tbody id="sessionRows"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');

      msg.style.display = 'none';
      msg.textContent = '';

      try {
        const response = await fetch('/ilias/m9wd/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });

        if (response.ok) {
          // Clear form
          document.getElementById('loginForm').reset();

          // Wait a moment for cookie to be set
          await new Promise(r => setTimeout(r, 100));

          // Show dashboard
          showDashboard();
        } else {
          msg.style.display = 'block';
          msg.textContent = '❌ Invalid credentials';
          msg.className = 'error';
        }
      } catch (error) {
        msg.style.display = 'block';
        msg.textContent = '❌ Error: ' + error.message;
        msg.className = 'error';
      }
    }

    function showLogin() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('dashboardPage').classList.remove('visible');
    }

    function showDashboard() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboardPage').classList.add('visible');
      loadSessions();
    }

    async function loadSessions() {
      const loading = document.getElementById('loading');
      const empty = document.getElementById('empty');
      const table = document.getElementById('sessionTable');
      const rows = document.getElementById('sessionRows');

      loading.style.display = 'block';
      empty.style.display = 'none';
      table.style.display = 'none';

      try {
        const response = await fetch('/ilias/m9wd/sessions', {
          credentials: 'include'
        });

        if (!response.ok) {
          throw new Error('Not authenticated');
        }

        const data = await response.json();
        const sessions = data.sessions || [];

        if (sessions.length === 0) {
          empty.style.display = 'block';
        } else {
          rows.innerHTML = sessions.map(s => `
            <tr>
              <td>${escapeHtml(s.username || 'N/A')}</td>
              <td>
                <div class="copy-container">
                  <span class="copy-value">${escapeHtml(s.uid)}</span>
                  <button class="copy-btn" onclick="copyToClipboard('${escapeAttr(s.uid)}', this)">Copy</button>
                </div>
              </td>
              <td>
                <div class="copy-container">
                  <span class="copy-value" title="${escapeHtml(s.sessionid)}">${escapeHtml(s.sessionid.substring(0, 30))}...</span>
                  <button class="copy-btn" onclick="copyToClipboard('${escapeAttr(s.sessionid)}', this)">Copy</button>
                </div>
              </td>
              <td>
                <div class="copy-container">
                  <span class="copy-value">${escapeHtml(s.csrftoken)}</span>
                  <button class="copy-btn" onclick="copyToClipboard('${escapeAttr(s.csrftoken)}', this)">Copy</button>
                </div>
              </td>
              <td>${new Date(s.added_at).toLocaleString()}</td>
              <td>${new Date(s.last_used).toLocaleString()}</td>
            </tr>
          `).join('');
          table.style.display = 'table';
        }
      } catch (error) {
        empty.textContent = 'Error loading sessions: ' + error.message;
        empty.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 1500);
      }).catch(err => {
        alert('Failed to copy: ' + err);
      });
    }

    async function handleLogout() {
      try {
        await fetch('/ilias/m9wd/logout', {
          method: 'POST',
          credentials: 'include'
        });
        showLogin();
      } catch (error) {
        alert('Logout error: ' + error.message);
      }
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function escapeAttr(text) {
      return text.replace(/'/g, "\\'");
    }

    // Check auth on page load
    window.addEventListener('load', async () => {
      try {
        const response = await fetch('/ilias/m9wd/sessions', {
          credentials: 'include'
        });
        if (response.ok) {
          showDashboard();
        } else {
          showLogin();
        }
      } catch {
        showLogin();
      }
    });
  </script>
</body>
</html>
