<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Sessions Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Login View */
    #loginView {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #loginView.show {
      display: flex;
    }

    .login-card {
      background: #1a1a1a;
      border: 2px solid #00d4ff;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .login-card h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d4ff;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #333;
      border-radius: 6px;
      background: #0f0f0f;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 6px;
      color: #000;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: scale(1.02);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .error {
      color: #ff4444;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    /* Dashboard View */
    #dashboardView {
      display: none;
    }

    #dashboardView.show {
      display: block;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #00d4ff;
    }

    .header h1 {
      color: #00d4ff;
      font-size: 28px;
    }

    .logout-btn {
      padding: 10px 20px;
      background: #ff4444;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #cc0000;
    }

    .sessions-table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .sessions-table thead {
      background: #0f0f0f;
      border-bottom: 2px solid #00d4ff;
    }

    .sessions-table th {
      padding: 15px;
      text-align: left;
      color: #00d4ff;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sessions-table td {
      padding: 15px;
      border-bottom: 1px solid #333;
      font-size: 13px;
      color: #ccc;
      word-break: break-all;
      max-width: 150px;
    }

    .sessions-table tbody tr:hover {
      background: #2a2a2a;
    }

    .sessions-table tbody tr:last-child td {
      border-bottom: none;
    }

    .copy-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn {
      padding: 5px 10px;
      background: #00d4ff;
      border: none;
      border-radius: 4px;
      color: #000;
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: #00ffff;
    }

    .copy-btn.copied {
      background: #44ff44;
      color: #000;
    }

    .value {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
      color: #88ff88;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 40px;
      font-size: 16px;
    }

    .loading {
      text-align: center;
      color: #00d4ff;
      padding: 20px;
      font-size: 16px;
    }

    .status {
      text-align: center;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 6px;
      background: #0f3a4a;
      color: #00d4ff;
      border: 1px solid #00d4ff;
    }
  </style>
</head>
<body>
  <!-- LOGIN VIEW -->
  <div id="loginView" class="show">
    <div class="login-card">
      <h1>🔐 Admin Panel</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn">Login</button>
        <div id="loginError" class="error"></div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView">
    <div class="container">
      <div class="header">
        <h1>📊 Sessions Manager</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div id="statusMsg" class="status" style="display: none;"></div>

      <div id="loading" class="loading" style="display: none;">Loading sessions...</div>

      <div id="tableContainer" style="display: none;">
        <table class="sessions-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>UID</th>
              <th>Session ID</th>
              <th>CSRF Token</th>
              <th>Added At</th>
              <th>Last Used</th>
            </tr>
          </thead>
          <tbody id="sessionsBody">
          </tbody>
        </table>
      </div>

      <div id="empty" class="empty">No sessions found</div>
    </div>
  </div>

  <script>
    // Check if already logged in on page load
    window.addEventListener('load', async () => {
      try {
        const res = await fetch('/ilias/m9wd/sessions');
        if (res.ok) {
          showDashboard();
          loadSessions();
        } else {
          showLogin();
        }
      } catch (err) {
        showLogin();
      }
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/ilias/m9wd/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          document.getElementById('username').value = '';
          document.getElementById('password').value = '';
          document.getElementById('loginError').textContent = '';
          showDashboard();
          loadSessions();
        } else {
          document.getElementById('loginError').textContent = 'Invalid credentials';
        }
      } catch (err) {
        document.getElementById('loginError').textContent = 'Connection error';
      }
    });

    function showLogin() {
      document.getElementById('loginView').classList.add('show');
      document.getElementById('dashboardView').classList.remove('show');
    }

    function showDashboard() {
      document.getElementById('loginView').classList.remove('show');
      document.getElementById('dashboardView').classList.add('show');
    }

    async function loadSessions() {
      const loading = document.getElementById('loading');
      const tableContainer = document.getElementById('tableContainer');
      const empty = document.getElementById('empty');
      const tbody = document.getElementById('sessionsBody');

      loading.style.display = 'block';
      tableContainer.style.display = 'none';
      empty.style.display = 'none';

      try {
        const res = await fetch('/ilias/m9wd/sessions');
        if (res.status === 401) {
          showLogin();
          return;
        }

        const data = await res.json();
        const sessions = data.sessions || [];

        if (sessions.length === 0) {
          empty.style.display = 'block';
        } else {
          tbody.innerHTML = sessions.map((s, i) => `
            <tr>
              <td>${s.username || 'N/A'}</td>
              <td>
                <div class="copy-cell">
                  <span class="value">${s.uid}</span>
                  <button class="copy-btn" onclick="copyToClipboard('${s.uid}', this)">Copy</button>
                </div>
              </td>
              <td>
                <div class="copy-cell">
                  <span class="value" title="${s.sessionid}">${s.sessionid.substring(0, 30)}...</span>
                  <button class="copy-btn" onclick="copyToClipboard('${s.sessionid.replace(/'/g, "\\'")}', this)">Copy</button>
                </div>
              </td>
              <td>
                <div class="copy-cell">
                  <span class="value" title="${s.csrftoken}">${s.csrftoken}</span>
                  <button class="copy-btn" onclick="copyToClipboard('${s.csrftoken}', this)">Copy</button>
                </div>
              </td>
              <td>${new Date(s.added_at).toLocaleString()}</td>
              <td>${new Date(s.last_used).toLocaleString()}</td>
            </tr>
          `).join('');
          tableContainer.style.display = 'block';
        }
      } catch (err) {
        empty.textContent = 'Error loading sessions: ' + err.message;
        empty.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = original;
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    async function logout() {
      try {
        await fetch('/ilias/m9wd/logout', { method: 'POST' });
        showLogin();
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').textContent = '';
      } catch (err) {
        alert('Logout error: ' + err.message);
      }
    }
  </script>
</body>
</html>
